services:
  - type: web
    name: disaster-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGINS
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: disaster-ml-flood
    runtime: python
    rootDir: ml_model
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PORT
        value: 10001
      - key: FLASK_DEBUG
        value: "0"

  - type: web
    name: disaster-ml-earthquake
    runtime: python
    rootDir: ml_model
    buildCommand: pip install -r requirements.txt
    startCommand: python earthquake_app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PORT
        value: 10002
      - key: FLASK_DEBUG
        value: "0"

  - type: web
    name: disaster-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_FLOOD_PREDICTION_URL
        sync: false
      - key: VITE_EARTHQUAKE_PREDICTION_URL
        sync: false
